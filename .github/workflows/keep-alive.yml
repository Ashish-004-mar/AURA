name: Keep AURA Chat Awake

on:
  schedule:
    # Yeh har 10-12 minute me automatic chalega
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Static Page
        run: |
          # Seedhe main website URL ko hit karenge taaki 200 OK response mile
          curl -sL -w "%{http_code}" -I https://aura-ai-8vmm.onrender.com/ -o /dev/null
          echo "Pinged successfully! AURA is awake."